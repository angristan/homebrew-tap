name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name (e.g. macthrottle)"
        required: true
      version:
        description: "Version (e.g. 1.7.3)"
        required: true

permissions:
  contents: write

jobs:
  update:
    name: Update ${{ github.event.client_payload.formula || inputs.formula }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update formula
        run: |
          FORMULA="${{ github.event.client_payload.formula || inputs.formula }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"

          echo "Updating ${FORMULA} to ${VERSION}"

          # Run the update script for this formula
          bash "scripts/update-${FORMULA}.sh" "$VERSION"

      - name: Commit and push
        run: |
          FORMULA="${{ github.event.client_payload.formula || inputs.formula }}"
          VERSION="${{ github.event.client_payload.version || inputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/" "Casks/"
          if git diff --cached --quiet; then
            echo "Already up to date"
          else
            git commit -m "${FORMULA} ${VERSION}"
            git push
          fi
